spring:
  application:
    name: slack-clone-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/slackclone}
    username: ${SPRING_DATASOURCE_USERNAME:slackclone}
    password: ${SPRING_DATASOURCE_PASSWORD:slackclone}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:slack-clone-secret-key-please-change-in-production-must-be-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

local:
  upload:
    dir: ${LOCAL_UPLOAD_DIR:/app/uploads}
    base-url: ${LOCAL_UPLOAD_BASE_URL:http://localhost:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.slackclone: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
