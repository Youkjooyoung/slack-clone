spring:
  application:
    name: slack-clone-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/slackclone
    username: slackclone
    password: slackclone1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: slack-clone-secret-key-please-change-in-production-must-be-at-least-256-bits
  expiration: 900000           # 15분 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    bucket-name: ${S3_BUCKET_NAME:}
    region: ap-northeast-2
    presigned-url-expiry-minutes: 15

local:
  upload:
    dir: /tmp/uploads
    base-url: http://localhost:8080

logging:
  level:
    com.slackclone: DEBUG
    org.springframework.security: DEBUG
