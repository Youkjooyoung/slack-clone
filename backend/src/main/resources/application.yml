spring:
  application:
    name: slack-clone-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/slackclone
    username: slackclone
    password: 68186234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: slack-clone-secret-key-please-change-in-production-must-be-at-least-256-bits
  expiration: 900000           # 15분 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

# aws.s3.* properties are intentionally omitted.
# Set env vars AWS_S3_ACCESS_KEY / AWS_S3_SECRET_KEY / AWS_S3_BUCKET_NAME / AWS_S3_REGION
# to enable direct-to-S3 presigned uploads; otherwise backend falls back to local storage.

local:
  upload:
    dir: /app/uploads
    base-url: http://localhost:8080

logging:
  level:
    com.slackclone: DEBUG
    org.springframework.security: DEBUG
